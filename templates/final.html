<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    font-family:Arial, sans-serif;
}

.container{
    text-align:center;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
    color:#333;
}

</style>
</head>

<body>

<div class="container">

    {% if responce %}
        <h1>Your Baby's Weight: {{ responce.prediction }}</h1>
    {% else %}
        <h1>No Prediction Yet</h1>
    {% endif %}

</div>

</body>
</html>
