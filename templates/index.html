<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birth Weight Predictor</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:40px;
    border-radius:12px;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    display:block;
    margin-top:12px;
    font-weight:bold;
    color:#444;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#667eea;
    box-shadow:0 0 5px rgba(102,126,234,0.5);
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5563d1;
}

</style>

</head>

<body>

<div class="container">

<h1>Predict Birth Weight</h1>

<form action="/predict" method="post">

<label>Gestation</label>
<input name="gestation" type="number" required>

<label>Parity</label>
<input name="parity" type="number" required>

<label>Age</label>
<input name="age" type="number" required>

<label>Height</label>
<input name="height" type="number" required>

<label>Weight</label>
<input name="weight" type="number" required>

<label>Smoke</label>
<input name="smoke" type="number" required>

<button type="submit">Predict Birth Weight</button><br><br>

</form>


</div>



</body>
</html>
